<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceso — Panel Inmobiliario</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    body { background: var(--green-deep); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-card {
      background: var(--white);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .login-logo-icon {
      width: 64px; height: 64px;
      background: var(--green-deep);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 12px;
    }
    .login-title {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--green-deep);
      margin-bottom: 4px;
    }
    .login-sub { font-size: 0.85rem; color: var(--gray); }
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--charcoal);
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--gray-light);
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--charcoal);
      outline: none;
      transition: border-color var(--transition);
    }
    .form-input:focus { border-color: var(--green-mid); }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--green-deep);
      color: var(--white);
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all var(--transition);
      margin-top: 4px;
    }
    .btn-login:hover { background: var(--green-mid); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg {
      background: #FEE2E2;
      color: #991B1B;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
    .back-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.82rem;
    }
    .back-link a { color: var(--green-mid); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🏡</div>
      <div class="login-title">Panel de Administración</div>
      <div class="login-sub">Asesora Inmobiliaria · Morelia</div>
    </div>
    
    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label class="form-label">Correo electrónico</label>
      <input class="form-input" type="email" id="emailInput" placeholder="tu@correo.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input class="form-input" type="password" id="passInput" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">Entrar →</button>
    
    <div class="back-link"><a href="../index.html">← Ir al sitio</a></div>
  </div>

  <script src="../js/config.js"></script>
  <script>
    // Check if already logged in
    sb.auth.getSession().then(({ data }) => {
      if (data.session) location.href = 'panel.html';
    });

    async function doLogin() {
      const email = document.getElementById('emailInput').value.trim();
      const pass  = document.getElementById('passInput').value;
      const btn   = document.getElementById('loginBtn');
      const err   = document.getElementById('errorMsg');

      if (!email || !pass) {
        showError('Ingresa tu correo y contraseña.');
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Entrando...';
      err.style.display = 'none';

      const { error } = await sb.auth.signInWithPassword({ email, password: pass });
      if (error) {
        showError('Correo o contraseña incorrectos. Intenta de nuevo.');
        btn.disabled = false;
        btn.textContent = 'Entrar →';
      } else {
        location.href = 'panel.html';
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    // Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
